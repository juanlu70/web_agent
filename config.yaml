# Web Agent Configuration
# Edit this file to customize the behavior of web_agent.

# Server Settings
server_host: "127.0.0.1"
server_port: 8400

# LLM Settings
ollama_base_url: "http://localhost:11434"
ollama_model: "glm-5.1:cloud"

# Search Settings
normal_search_results: 10
deep_search_results: 50

# Agent Settings
max_subagents: 3
subagent_depth_limit: 3
max_agent_iterations: 10

# Browser Settings
headless: true
browser_timeout_ms: 30000

# Paths
skills_dir: ""   # Leave empty for default (project_root/skills)
guardrails_file: ""   # Leave empty for default (project_root/guardrails.md)

# Conversation History
max_history_entries: 15